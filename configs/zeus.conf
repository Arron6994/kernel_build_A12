# Xiaomi 12 Pro (Zeus) Device Configuration
# This file contains device-specific build configuration

# Device Information
DEVICE_NAME="zeus"
DEVICE_CODENAME="zeus"
DEVICE_FULL_NAME="Xiaomi 12 Pro"
DEVICE_BRAND="Xiaomi"
DEVICE_MODEL="2201122G"

# Platform Information
PLATFORM="sm8450"
SOC="Snapdragon 8 Gen 1"
ARCH="arm64"
CPU_VARIANT="kryo"

# Android Version
ANDROID_VERSION="12"
ANDROID_SDK_VERSION="31"
SECURITY_PATCH_LEVEL="2024-01-01"

# Kernel Information
KERNEL_VERSION="5.10"
KERNEL_BRANCH="android12-5.10"
KERNEL_SOURCE_URL="https://github.com/MiCode/Xiaomi_Kernel_OpenSource"
KERNEL_BRANCH_NAME="zeus-s-oss"

# Build Configuration
TARGET_KERNEL_CONFIG="zeus_defconfig"
TARGET_KERNEL_SOURCE="kernel"
TARGET_KERNEL_HEADER_ARCH="arm64"

# Toolchain Configuration
TARGET_KERNEL_CLANG_COMPILE="true"
TARGET_KERNEL_CLANG_VERSION="r450784d"
CLANG_TRIPLE="aarch64-linux-gnu-"
CROSS_COMPILE="aarch64-linux-android-"
CROSS_COMPILE_ARM32="arm-linux-androideabi-"

# KernelSU Configuration
KERNELSU_ENABLED="true"
KERNELSU_VERSION="next"
KERNELSU_URL="https://github.com/rifsxd/KernelSU-Next"
KERNELSU_BRANCH="next"

# SusFS Configuration
SUSFS_ENABLED="true"
SUSFS_URL="https://github.com/sidex15/SusFS4KernelSU"
SUSFS_BRANCH="main"

# Boot Image Configuration
BOARD_KERNEL_BASE="0x00000000"
BOARD_KERNEL_PAGESIZE="4096"
BOARD_KERNEL_OFFSET="0x00008000"
BOARD_RAMDISK_OFFSET="0x01000000"
BOARD_KERNEL_TAGS_OFFSET="0x00000100"
BOARD_BOOTIMG_HEADER_VERSION="4"

# Kernel Command Line
BOARD_KERNEL_CMDLINE="console=ttyMSM0,115200n8 androidboot.hardware=qcom androidboot.console=ttyMSM0 androidboot.memcg=1 lpm_levels.sleep_disabled=1 video=vfb:640x400,bpp=32,memsize=3072000 msm_rtb.filter=0x237 service_locator.enable=1 androidboot.usbcontroller=a600000.dwc3 swiotlb=0 loop.max_part=7 cgroup.memory=nokmem,nosocket pcie_ports=compat loop.max_part=7 iptable_raw.raw_before_defrag=1 ip6table_raw.raw_before_defrag=1"

# Additional Build Flags
TARGET_KERNEL_ADDITIONAL_FLAGS="CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip"

# Output Configuration
OUT_DIR="out"
DIST_DIR="dist"
KERNEL_BINARY="Image.gz"
DTB_FILE="zeus.dtb"
DTBO_FILE="dtbo.img"

# Export all variables
export DEVICE_NAME DEVICE_CODENAME DEVICE_FULL_NAME DEVICE_BRAND DEVICE_MODEL
export PLATFORM SOC ARCH CPU_VARIANT
export ANDROID_VERSION ANDROID_SDK_VERSION SECURITY_PATCH_LEVEL
export KERNEL_VERSION KERNEL_BRANCH KERNEL_SOURCE_URL KERNEL_BRANCH_NAME
export TARGET_KERNEL_CONFIG TARGET_KERNEL_SOURCE TARGET_KERNEL_HEADER_ARCH
export TARGET_KERNEL_CLANG_COMPILE TARGET_KERNEL_CLANG_VERSION CLANG_TRIPLE
export CROSS_COMPILE CROSS_COMPILE_ARM32
export KERNELSU_ENABLED KERNELSU_VERSION KERNELSU_URL KERNELSU_BRANCH
export SUSFS_ENABLED SUSFS_URL SUSFS_BRANCH
export BOARD_KERNEL_BASE BOARD_KERNEL_PAGESIZE BOARD_KERNEL_OFFSET
export BOARD_RAMDISK_OFFSET BOARD_KERNEL_TAGS_OFFSET BOARD_BOOTIMG_HEADER_VERSION
export BOARD_KERNEL_CMDLINE TARGET_KERNEL_ADDITIONAL_FLAGS OUT_DIR DIST_DIR KERNEL_BINARY DTB_FILE DTBO_FILE